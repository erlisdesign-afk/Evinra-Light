<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evinra - Add Production from EM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* LIGHT MODE */
      --primary: #2A9B85;
      --primary-dim: rgba(42, 155, 133, 0.1);
      --primary-border: #1e7d6b;
      --bg: #ffffff;
      --bg2: #f9f9f9;
      --bg3: #f3f3f3;
      --bg4: #efefef;
      --text: #1a1a1a;
      --text2: #666666;
      --text3: #999999;
      --border: #e0e0e0;
      --violet: #7c3aed;
      --violet-dim: rgba(124, 58, 237, 0.1);
      --violet-border: #e9d5ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: rgba(0, 0, 0, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* MODAL */
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-header h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-header svg {
      width: 15px;
      height: 15px;
      color: var(--primary);
    }

    .modal-close {
      width: 26px;
      height: 26px;
      background: transparent;
      border: none;
      color: var(--text3);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    /* MODE BAR */
    .mode-bar {
      display: flex;
      padding: 10px 18px 0px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 4px;
    }

    .mode-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: transparent;
      border: none;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .mode-btn svg {
      width: 12px;
      height: 12px;
    }

    .mode-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* MODAL CONTENT */
    .modal-content {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* INFO NOTICE */
    .info-notice {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--primary-dim);
      border: 1px solid var(--primary-border);
      border-radius: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .info-notice svg {
      width: 13px;
      height: 13px;
      color: var(--primary);
      flex-shrink: 0;
    }

    .info-notice p {
      font-size: 11px;
      color: var(--text2);
      margin: 0;
    }

    /* EM LIST */
    .em-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .em-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .em-item:hover {
      background: var(--bg4);
      border-color: var(--primary);
    }

    .em-checkbox {
      width: 14px;
      height: 14px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .em-item-content {
      flex: 1;
      min-width: 0;
    }

    .em-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }

    .em-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      background: var(--violet-dim);
      color: var(--violet);
      border-radius: 4px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .em-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .em-code {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--text3);
    }

    .em-contact {
      font-size: 11px;
      color: var(--text3);
      font-family: 'Inter', sans-serif;
      margin-top: 2px;
    }

    .em-description {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* MODAL FOOTER */
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #1f8b75;
      box-shadow: 0 8px 24px rgba(42, 155, 133, 0.35);
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg4);
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="modal">
    <!-- MODAL HEADER -->
    <div class="modal-header">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        Add Production
      </h2>
      <button class="modal-close">✕</button>
    </div>

    <!-- MODE BAR -->
    <div class="mode-bar">
      <button class="mode-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Import from Event Management Module
      </button>
      <button class="mode-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4v16M4 12h16"></path>
        </svg>
        Create Manually
      </button>
    </div>

    <!-- MODAL CONTENT -->
    <div class="modal-content">
      <!-- INFO NOTICE -->
      <div class="info-notice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 8v4M12 16h.01"></path>
        </svg>
        <p>Productions from Evinra Event Management are automatically marked <strong>Active</strong> when imported.</p>
      </div>

      <!-- EM LIST -->
      <div class="em-list">
        <!-- Item 1 -->
        <label class="em-item">
          <input type="checkbox" class="em-checkbox" />
          <div class="em-item-content">
            <div class="em-item-header">
              <span class="em-badge">EM</span>
              <span class="em-name">Urban Rhythm</span>
              <span class="em-code">UR</span>
            </div>
            <div class="em-contact">City Arts Group · hello@urbanrhythm.com</div>
            <div class="em-description">Contemporary urban dance and music production</div>
          </div>
        </label>

        <!-- Item 2 -->
        <label class="em-item">
          <input type="checkbox" class="em-checkbox" />
          <div class="em-item-content">
            <div class="em-item-header">
              <span class="em-badge">EM</span>
              <span class="em-name">Ocean Wonders</span>
              <span class="em-code">OW</span>
            </div>
            <div class="em-contact">Blue Wave Ent. · info@oceanwonders.com</div>
            <div class="em-description">Aquatic themed family entertainment tour</div>
          </div>
        </label>

        <!-- Item 3 -->
        <label class="em-item">
          <input type="checkbox" class="em-checkbox" />
          <div class="em-item-content">
            <div class="em-item-header">
              <span class="em-badge">EM</span>
              <span class="em-name">Steel Dreams</span>
              <span class="em-code">SD</span>
            </div>
            <div class="em-contact">Iron Stage Prods. · contact@steeldreams.io</div>
            <div class="em-description">Industrial-themed acrobatic performance series</div>
          </div>
        </label>

        <!-- Item 4 -->
        <label class="em-item">
          <input type="checkbox" class="em-checkbox" />
          <div class="em-item-content">
            <div class="em-item-header">
              <span class="em-badge">EM</span>
              <span class="em-name">Neon Carnival</span>
              <span class="em-code">NC</span>
            </div>
            <div class="em-contact">Bright Ent. Group · info@neoncarnival.com</div>
            <div class="em-description">High-energy carnival with light and music acts</div>
          </div>
        </label>

        <!-- Item 5 -->
        <label class="em-item">
          <input type="checkbox" class="em-checkbox" />
          <div class="em-item-content">
            <div class="em-item-header">
              <span class="em-badge">EM</span>
              <span class="em-name">Coastal Rhythms</span>
              <span class="em-code">CR</span>
            </div>
            <div class="em-contact">Shore Events LLC · events@coastalrhythms.com</div>
            <div class="em-description">Beach festival series with live music stages</div>
          </div>
        </label>
      </div>
    </div>

    <!-- MODAL FOOTER -->
    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-primary">Import Selected</button>
    </div>
  </div>
</body>
</html>
