<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evinra - Add Production</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800" rel="stylesheet">

  <style>
    :root {
      /* LIGHT MODE */
      --primary: #2A9B85;
      --primary-dim: rgba(42, 155, 133, 0.1);
      --primary-border: #1e7d6b;
      --bg: #ffffff;
      --bg2: #f9f9f9;
      --bg3: #f3f3f3;
      --bg4: #efefef;
      --text: #1a1a1a;
      --text2: #666666;
      --text3: #999999;
      --border: #e0e0e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: rgba(0, 0, 0, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* MODAL */
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text3);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
      border-color: var(--text2);
      background: var(--bg3);
    }

    .modal-content {
      padding: 24px;
    }

    /* FORM GROUPS */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .form-input,
    .form-select,
    textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus,
    .form-select:focus,
    textarea:focus {
      border-color: var(--primary);
      background: var(--bg4);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: 'Inter', sans-serif;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .help-text {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    /* MODAL FOOTER */
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #1f8b75;
      box-shadow: 0 8px 24px rgba(42, 155, 133, 0.35);
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg4);
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="modal">
    <!-- MODAL HEADER -->
    <div class="modal-header">
      <h2>Add Production</h2>
      <button class="modal-close">✕</button>
    </div>

    <!-- MODAL CONTENT -->
    <div class="modal-content">
      <!-- PRODUCTION ID -->
      <div class="form-group">
        <label class="form-label">Production ID</label>
        <input type="text" class="form-input" placeholder="PRD-001" value="">
        <p class="help-text">Auto-generated identifier for this production</p>
      </div>

      <!-- PRODUCTION NAME -->
      <div class="form-group">
        <label class="form-label">Production Name</label>
        <input type="text" class="form-input" placeholder="e.g., Summer Festival 2026" value="">
      </div>

      <!-- TWO COLUMNS -->
      <div class="form-row">
        <!-- CONTACT NAME -->
        <div class="form-group">
          <label class="form-label">Contact Name</label>
          <input type="text" class="form-input" placeholder="John Doe" value="">
        </div>

        <!-- CONTACT EMAIL -->
        <div class="form-group">
          <label class="form-label">Contact Email</label>
          <input type="email" class="form-input" placeholder="john@example.com" value="">
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" placeholder="Brief description of the production..."></textarea>
      </div>

      <!-- SOURCE -->
      <div class="form-group">
        <label class="form-label">Source</label>
        <select class="form-select">
          <option value="">Select source</option>
          <option value="directory">From EM Directory</option>
          <option value="manual">Create Manually</option>
          <option value="import">Import from CSV</option>
        </select>
      </div>

      <!-- STATUS -->
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="archived">Archived</option>
        </select>
      </div>
    </div>

    <!-- MODAL FOOTER -->
    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-primary">Add Production</button>
    </div>
  </div>
</body>
</html>
