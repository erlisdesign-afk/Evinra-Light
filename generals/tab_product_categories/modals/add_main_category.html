<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evinra - Add Main Category</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAFAFE;
      --bg2: #F5F7FA;
      --bg3: #EEF1F5;
      --bg4: #E8EBF0;
      --primary: #2A9B85;
      --primary-dim: rgba(42,155,133,.08);
      --primary-border: rgba(42,155,133,.2);
      --text: #1A1A2E;
      --text2: #5A6B6B;
      --text3: #8A9B9B;
      --border: rgba(0,0,0,.06);
    }

    body {
      background: rgba(0, 0, 0, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .modal {
      background: var(--bg);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 20px;
      transition: all 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-label.required::after {
      content: " *";
      color: #ef4444;
    }

    .form-input {
      padding: 12px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .form-input::placeholder {
      color: var(--text3);
    }

    .form-input:focus {
      border-color: var(--primary);
      background: var(--bg2);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    /* MODAL FOOTER */
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-cancel {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover {
      background: var(--bg4);
      border-color: var(--primary-border);
    }

    .btn-save {
      background: var(--primary);
      color: white;
    }

    .btn-save:hover {
      background: #1f8b75;
      box-shadow: 0 8px 24px rgba(42, 155, 133, 0.35);
    }
  </style>
</head>
<body>

<div class="modal">
  <div class="modal-header">
    <div class="modal-title">Add Main Category</div>
    <button class="modal-close">&times;</button>
  </div>

  <div class="modal-body">
    <div class="form-group">
      <label class="form-label required">Name</label>
      <input type="text" class="form-input" placeholder="category name...">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <input type="text" class="form-input" placeholder="Optional description...">
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
    <button class="btn btn-save" onclick="saveCategory()">
      <i class="hgi-stroke hgi-check"></i>
      Save
    </button>
  </div>
</div>

<script>
  function closeModal() {
    window.history.back();
  }

  function saveCategory() {
    const nameInput = document.querySelector('input[placeholder="category name..."]');
    const descInput = document.querySelector('input[placeholder="Optional description..."]');
    const name = nameInput.value;

    if (!name) {
      alert('Please fill in the category name');
      return;
    }

    console.log('Saving category:', { name, description: descInput.value });
    alert('Category saved successfully!');
  }
</script>

</body>
</html>
