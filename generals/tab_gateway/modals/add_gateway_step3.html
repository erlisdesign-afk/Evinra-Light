<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evinra - Add Gateway - Step 3</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAFAFE;
      --bg2: #F5F7FA;
      --bg3: #EEF1F5;
      --bg4: #E8EBF0;
      --primary: #2A9B85;
      --primary-dim: rgba(42,155,133,.08);
      --primary-border: rgba(42,155,133,.2);
      --text: #1A1A2E;
      --text2: #5A6B6B;
      --text3: #8A9B9B;
      --border: rgba(0,0,0,.06);
    }

    body {
      background: rgba(0, 0, 0, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .modal {
      background: var(--bg);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-icon {
      width: 28px;
      height: 28px;
      background: var(--primary-dim);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 16px;
    }

    .modal-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 20px;
      transition: all 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    /* STEPS INDICATOR */
    .steps-indicator {
      background: var(--bg2);
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text3);
      white-space: nowrap;
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step.active .step-number {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .step.active {
      color: var(--text);
      font-weight: 600;
    }

    .step-separator {
      color: var(--text3);
      font-weight: 600;
      margin: 0 4px;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .step-description {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.4;
    }

    .checkbox-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox-item:hover {
      border-color: var(--primary-border);
      background: var(--bg3);
    }

    .checkbox-item.selected {
      border-color: var(--primary);
      background: var(--primary-dim);
    }

    .checkbox-check {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .checkbox-item.selected .checkbox-check {
      border-color: var(--primary);
      background: var(--primary);
    }

    .checkbox-check::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
    }

    .checkbox-item.selected .checkbox-check::after {
      opacity: 1;
    }

    .checkbox-icon {
      width: 28px;
      height: 28px;
      background: var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 14px;
      flex-shrink: 0;
    }

    .checkbox-info {
      flex: 1;
      min-width: 0;
    }

    .checkbox-label {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .checkbox-description {
      font-size: 11px;
      color: var(--text3);
    }

    /* TOGGLE SWITCH */
    .toggle-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .toggle-label {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
    }

    .toggle-description {
      font-size: 11px;
      color: var(--text3);
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      padding: 0;
    }

    .toggle-switch.active {
      background: var(--primary);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.2s;
    }

    .toggle-switch.active::after {
      left: 22px;
    }

    /* MODAL FOOTER */
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .footer-left {
      display: flex;
      gap: 12px;
    }

    .footer-right {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-back:hover {
      background: var(--bg4);
      border-color: var(--primary-border);
    }

    .btn-cancel {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover {
      background: var(--bg4);
      border-color: var(--primary-border);
    }

    .btn-finish {
      background: var(--primary);
      color: white;
    }

    .btn-finish:hover {
      background: #1f8b75;
      box-shadow: 0 8px 24px rgba(42, 155, 133, 0.35);
    }
  </style>
</head>
<body>

<div class="modal">
  <div class="modal-header">
    <div class="modal-header-left">
      <div class="modal-icon">
        <i class="hgi-stroke hgi-wallet-03"></i>
      </div>
      <div class="modal-title">Add Gateway</div>
    </div>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>

  <div class="steps-indicator">
    <div class="step">
      <div class="step-number">1</div>
      <span>General Info</span>
    </div>
    <div class="step-separator">›</div>
    <div class="step">
      <div class="step-number">2</div>
      <span>Locations</span>
    </div>
    <div class="step-separator">›</div>
    <div class="step active">
      <div class="step-number">3</div>
      <span>Usage</span>
    </div>
  </div>

  <div class="modal-body">
    <div class="step-description">
      Where is this gateway used? Select one or both channels. Selecting both makes it available everywhere.
    </div>

    <div class="checkbox-item selected" onclick="toggleCheckbox(this)">
      <div class="checkbox-check"></div>
      <div class="checkbox-icon">
        <i class="hgi-stroke hgi-shopping-cart-01"></i>
      </div>
      <div class="checkbox-info">
        <div class="checkbox-label">Storefront</div>
        <div class="checkbox-description">Public online store checkout</div>
      </div>
    </div>

    <div class="checkbox-item selected" onclick="toggleCheckbox(this)">
      <div class="checkbox-check"></div>
      <div class="checkbox-icon">
        <i class="hgi-stroke hgi-building-02"></i>
      </div>
      <div class="checkbox-info">
        <div class="checkbox-label">On-Site</div>
        <div class="checkbox-description">Box office & on-site terminals</div>
      </div>
    </div>

    <div class="toggle-section">
      <div class="toggle-info">
        <div class="toggle-label">Active</div>
        <div class="toggle-description">Enable this gateway for processing payments</div>
      </div>
      <button class="toggle-switch active" onclick="this.classList.toggle('active')"></button>
    </div>
  </div>

  <div class="modal-footer">
    <div class="footer-left">
      <button class="btn btn-back" onclick="previousStep()">
        <i class="hgi-stroke hgi-arrow-left"></i>
        Back
      </button>
    </div>
    <div class="footer-right">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-finish" onclick="finishGateway()">
        <i class="hgi-stroke hgi-check"></i>
        Finish
      </button>
    </div>
  </div>
</div>

<script>
  function toggleCheckbox(element) {
    element.classList.toggle('selected');
  }

  function closeModal() {
    window.history.back();
  }

  function previousStep() {
    window.location.href = 'add_gateway_step2.html';
  }

  function finishGateway() {
    console.log('Gateway added successfully!');
    alert('Gateway added successfully!');
  }
</script>

</body>
</html>
