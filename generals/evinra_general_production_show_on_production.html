<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evinra - Production Shows</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* LIGHT MODE */
      --primary: #2A9B85;
      --primary-dim: rgba(42, 155, 133, 0.1);
      --primary-border: #1e7d6b;
      --bg: #ffffff;
      --bg2: #f9f9f9;
      --bg3: #f3f3f3;
      --bg4: #efefef;
      --text: #1a1a1a;
      --text2: #666666;
      --text3: #999999;
      --border: #e0e0e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: rgba(0, 0, 0, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      width: 1920px;
    }

    /* MODAL */
    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-header-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .modal-header h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      margin: 0;
    }

    .modal-header-meta {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text3);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text3);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      color: var(--text);
      border-color: var(--text2);
      background: var(--bg3);
    }

    /* TAB BAR */
    .tab-bar {
      display: flex;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 0;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: transparent;
      border: none;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
    }

    /* MODAL CONTENT */
    .modal-content {
      padding: 24px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* INFO NOTICE */
    .info-notice {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--primary-dim);
      border: 1px solid var(--primary-border);
      border-radius: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .info-notice svg {
      width: 13px;
      height: 13px;
      color: var(--primary);
      flex-shrink: 0;
    }

    .info-notice p {
      font-size: 11px;
      color: var(--text2);
      margin: 0;
      font-family: 'Inter', sans-serif;
    }

    /* TABLE */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--bg3);
    }

    th {
      padding: 12px;
      text-align: left;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
      height: 45px;
    }

    tbody tr {
      height: 65px;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
    }

    tbody tr:hover {
      background: var(--bg2);
    }

    td {
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }

    td.text-secondary {
      color: var(--text2);
      font-size: 12px;
    }

    /* STATUS BADGE */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: rgba(42, 155, 133, 0.1);
      color: var(--primary);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: capitalize;
      font-family: 'Inter', sans-serif;
    }

    /* ACTION BUTTON */
    .action-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--bg3);
      color: var(--primary);
    }

    /* MODAL FOOTER */
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg4);
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="modal">
    <!-- MODAL HEADER -->
    <div class="modal-header">
      <div class="modal-header-content">
        <h2>Evinra Faris Event</h2>
        <div class="modal-header-meta">PRD-001</div>
      </div>
      <button class="modal-close">✕</button>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
      <button class="tab-btn">Basic Information</button>
      <button class="tab-btn active">Shows</button>
    </div>

    <!-- MODAL CONTENT -->
    <div class="modal-content">
      <!-- INFO NOTICE -->
      <div class="info-notice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 8v4M12 16h.01"></path>
        </svg>
        <p>Shows linked to this production.</p>
      </div>

      <!-- TABLE -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Date</th>
              <th>Seats</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <!-- Row 1 -->
            <tr>
              <td class="text-secondary">SHW-001</td>
              <td>Night1 — Faris</td>
              <td class="text-secondary">Dec 12 2025</td>
              <td class="text-secondary">1200</td>
              <td><span class="status-badge">Active</span></td>
              <td>
                <button class="action-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>
              </td>
            </tr>
            <!-- Row 2 -->
            <tr>
              <td class="text-secondary">SHW-002</td>
              <td>Night2 — Faris</td>
              <td class="text-secondary">Dec 13 2025</td>
              <td class="text-secondary">1200</td>
              <td><span class="status-badge">Active</span></td>
              <td>
                <button class="action-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- MODAL FOOTER -->
    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
    </div>
  </div>
</body>
</html>
