<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evinra — Products Categories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2A9B85;
      --primary-dim: rgba(42, 155, 133, 0.1);
      --primary-border: #1e7d6b;
      --bg: #ffffff;
      --bg2: #f9f9f9;
      --bg3: #f3f3f3;
      --bg4: #efefef;
      --text: #1a1a1a;
      --text2: #666666;
      --text3: #999999;
      --border: #e0e0e0;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Inter', sans-serif; font-weight: 700; }
    .container { display: flex; height: 100vh; width: 1920px; margin: 0 auto; }
    .sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; padding: 24px 0; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
    .sb-header { padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; display: flex; gap: 12px; align-items: center; cursor: pointer; }
    .sb-header:hover { background: rgba(0,0,0,.02); }
    .sb-logo { width: 40px; height: 40px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-family: 'Inter', sans-serif; color: white; }
    .sb-nav { flex: 1; overflow-y: auto; min-height: 0; }
    .sb-section { padding: 0 12px 16px; }
    .sb-group-title { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 12px 8px; border-bottom: 1px solid var(--border); }
    .sb-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 6px; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; text-decoration: none; }
    .sb-item:hover { background: var(--primary-dim); color: var(--text); border-color: var(--primary-border); }
    .sb-item.active { background: var(--primary-dim); color: var(--primary); border-color: var(--primary-border); }
    .sb-user { border-top: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-top: auto; }
    .sb-user-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; color: white; }
    .sb-user-name { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 12px; color: var(--text); }
    .sb-user-role { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--text3); text-transform: uppercase; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; gap: 20px; }
    .topbar-left { display: flex; flex-direction: column; gap: 2px; }
    .topbar-title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; }
    .topbar-breadcrumb { font-size: 11px; color: var(--text3); }
    .topbar-right { display: flex; gap: 8px; margin-left: auto; }
    .topbar-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 14px; cursor: pointer; }
