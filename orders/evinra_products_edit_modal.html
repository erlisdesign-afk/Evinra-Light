<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product - Evinra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">

  <style>
    :root {
      --primary: #2A9B85;
      --primary-dim: rgba(42, 155, 133, 0.1);
      --primary-border: #1e7d6b;
      --bg: #ffffff;
      --bg2: #f9f9f9;
      --bg3: #f3f3f3;
      --bg4: #efefef;
      --text: #1a1a1a;
      --text2: #666666;
      --text3: #999999;
      --border: #e0e0e0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 1920px;
      margin: 0 auto;
    }
    body {
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-header h2 {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .modal-header svg {
      width: 20px;
      height: 20px;
      stroke: var(--primary);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s;
      border-radius: 6px;
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--bg3);
    }

    .modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .info-alert {
      background: #D1F2EB;
      border: 1px solid #A8E6D9;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #1B6E5F;
      font-size: 12px;
    }

    .info-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .form-section-title {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .image-section {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .image-preview {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      background: var(--bg3);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .image-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .btn-remove-image {
      padding: 6px 12px;
      background: #FEE2E2;
      border: 1px solid #FECACA;
      color: #DC2626;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: fit-content;
    }

    .btn-remove-image:hover {
      background: #FECACA;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .form-label.required::after {
      content: ' *';
      color: #ef4444;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .form-input::placeholder {
      color: var(--text3);
    }

    .form-input:focus, .form-select:focus {
      border-color: var(--primary);
      background: var(--bg4);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .form-row-price {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .form-row-price .form-group {
      flex: 1;
    }

    .price-symbol {
      font-weight: 600;
      color: var(--text2);
      padding: 12px;
      height: 40px;
      display: flex;
      align-items: center;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg3);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .toggle-switch {
      width: 44px;
      height: 24px;
      background: #cbd5e1;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      padding: 0;
      flex-shrink: 0;
    }

    .toggle-switch.active {
      background: var(--primary);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }

    .toggle-switch.active::after {
      left: 22px;
    }

    .toggle-label {
      flex: 1;
    }

    .toggle-label-main {
      font-weight: 600;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
    }

    .toggle-label-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn.primary {
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn.primary:hover {
      background: #1f8b73;
      box-shadow: 0 8px 24px rgba(42, 155, 133, 0.35);
      transform: translateY(-1px);
    }

    .btn.primary svg {
      width: 14px;
      height: 14px;
    }

    .btn.secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.secondary:hover {
      background: var(--bg4);
      border-color: var(--primary);
    }
  </style>
</head>
<body>

<div class="modal">
  <div class="modal-header">
    <h2>
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Edit — SNO CONE LIGHT CUP
    </h2>
    <button class="modal-close">×</button>
  </div>

  <div class="modal-content">
    <div class="info-alert">
      <div class="info-icon">✓</div>
      <div>Inherited from Evinra Catalog — editing overrides local values only</div>
    </div>

    <div>
      <div class="form-section-title">Product Image</div>
      <div class="image-section">
        <div class="image-preview">🏔️</div>
        <div class="image-controls">
          <div style="font-size: 11px; color: var(--text3);">Click the box or drag & drop an image.<br>PNG, JPG, WEBP — displayed in the product table.</div>
          <button class="btn-remove-image">Remove Image</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label required">Item Name</label>
      <input type="text" class="form-input" value="SNO CONE LIGHT CUP">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label required">Item Code</label>
        <input type="text" class="form-input" value="CSC001">
      </div>
      <div></div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label required">Main Category</label>
        <select class="form-select">
          <option selected>Concession</option>
          <option>Merchandise</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select">
          <option selected>Foods</option>
          <option>Drinks</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Sub Category</label>
        <select class="form-select">
          <option selected>Snow Cones</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label class="form-label required">Price ($)</label>
        <div class="form-row-price">
          <div class="price-symbol">$</div>
          <div class="form-group">
            <input type="text" class="form-input" value="14">
          </div>
        </div>
      </div>
    </div>

    <div class="toggle-group">
      <button class="toggle-switch active"></button>
      <div class="toggle-label">
        <div class="toggle-label-main">Active</div>
        <div class="toggle-label-sub">Visible in catalog and events</div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn secondary">Cancel</button>
    <button class="btn primary">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/></svg>
      Save Item
    </button>
  </div>
</div>

</body>
</html>
