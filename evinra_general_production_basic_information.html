<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evinra - Production Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* LIGHT MODE */
      --primary: #2A9B85;
      --primary-dim: rgba(42, 155, 133, 0.1);
      --primary-border: #1e7d6b;
      --bg: #ffffff;
      --bg2: #f9f9f9;
      --bg3: #f3f3f3;
      --bg4: #efefef;
      --text: #1a1a1a;
      --text2: #666666;
      --text3: #999999;
      --border: #e0e0e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: rgba(0, 0, 0, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      width: 1920px;
    }

    /* MODAL */
    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-header-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .modal-header h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      margin: 0;
    }

    .modal-header-meta {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text3);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text3);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      color: var(--text);
      border-color: var(--text2);
      background: var(--bg3);
    }

    /* TAB BAR */
    .tab-bar {
      display: flex;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 0;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: transparent;
      border: none;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
    }

    /* MODAL CONTENT */
    .modal-content {
      padding: 24px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* FORM GROUPS */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .form-label .required {
      color: #ef4444;
    }

    .form-input,
    .form-select,
    textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus,
    .form-select:focus,
    textarea:focus {
      border-color: var(--primary);
      background: var(--bg4);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: 'Inter', sans-serif;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* MODAL FOOTER */
    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #1f8b75;
      box-shadow: 0 8px 24px rgba(42, 155, 133, 0.35);
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg4);
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="modal">
    <!-- MODAL HEADER -->
    <div class="modal-header">
      <div class="modal-header-content">
        <h2>Evinra Faris Event</h2>
        <div class="modal-header-meta">PRD-001</div>
      </div>
      <button class="modal-close">✕</button>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
      <button class="tab-btn active">Basic Information</button>
      <button class="tab-btn">Shows</button>
    </div>

    <!-- MODAL CONTENT -->
    <div class="modal-content">
      <!-- PRODUCTION NAME -->
      <div class="form-group">
        <label class="form-label">Production Name <span class="required">*</span></label>
        <input type="text" class="form-input" value="Evinra Faris Event">
      </div>

      <!-- SHORT CODE -->
      <div class="form-group">
        <label class="form-label">Short Code</label>
        <input type="text" class="form-input" placeholder="E.G. SF26">
      </div>

      <!-- DESCRIPTION -->
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input">Main touring production with full experience lineup</textarea>
      </div>

      <!-- TWO COLUMNS -->
      <div class="form-row">
        <!-- STATUS -->
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select">
            <option value="active" selected>Active</option>
            <option value="inactive">Inactive</option>
            <option value="archived">Archived</option>
          </select>
        </div>

        <!-- SOURCE -->
        <div class="form-group">
          <label class="form-label">Source</label>
          <select class="form-select">
            <option value="local" selected>Local</option>
            <option value="em">From EM Directory</option>
          </select>
        </div>
      </div>

      <!-- CONTACT PERSON -->
      <div class="form-group">
        <label class="form-label">Contact Person</label>
        <input type="text" class="form-input" value="Maria Santos">
      </div>

      <!-- CONTACT EMAIL -->
      <div class="form-group">
        <label class="form-label">Contact Email</label>
        <input type="email" class="form-input" value="msantos@evinra.com">
      </div>
    </div>

    <!-- MODAL FOOTER -->
    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-primary">Save Changes</button>
    </div>
  </div>
</body>
</html>
